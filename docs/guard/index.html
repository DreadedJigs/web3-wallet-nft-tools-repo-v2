<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dreaded Guard</title>
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="demo.css" />
</head>
<body>
  <header class="appbar">
    <div class="brand-lockup">
      <span class="brand-mark" aria-hidden="true">DG</span>
      <div>
        <p class="eyebrow">Standalone SDK</p>
        <h1>Dreaded Guard</h1>
      </div>
    </div>
    <div class="app-actions">
      <a class="ghost-button" href="../">Vault</a>
    </div>
  </header>

  <main class="guard-demo">
    <section class="surface">
      <div class="section-title">
        <div>
          <p class="eyebrow">Audit JSON</p>
          <h2>Wallet Intent</h2>
        </div>
        <button id="auditIntent" type="button">Audit</button>
      </div>
      <textarea id="intentInput" spellcheck="false"></textarea>
    </section>

    <section class="surface">
      <div class="section-title">
        <div>
          <p class="eyebrow">Result</p>
          <h2>Guard Decision</h2>
        </div>
      </div>
      <div id="guardResult"></div>
    </section>
  </main>

  <script src="dreaded-guard.js"></script>
  <script src="demo.js"></script>
</body>
</html>
