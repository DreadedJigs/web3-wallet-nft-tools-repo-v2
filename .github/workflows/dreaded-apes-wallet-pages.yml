name: Validate Dreaded Apes Wallet Pages Source

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - dreaded-apes-wallet/public/**
      - .github/workflows/dreaded-apes-wallet-pages.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate GitHub Pages source
        shell: bash
        run: |
          set -euo pipefail

          test -f docs/index.html
          test -f docs/app.js
          test -f docs/styles.css
          test -f docs/release.json
          test -f docs/.nojekyll

          python3 - <<'PY'
          import json
          from pathlib import Path

          release = json.loads(Path("docs/release.json").read_text(encoding="utf-8"))
          assert release["name"] == "Dreaded Apes Wallet"
          assert release["mode"] == "production"
          assert release["serviceWorkerCache"] == "dreaded-apes-wallet-v12"

          required = [
              "docs/guard/v1/dreaded-guard.js",
              "docs/downloads/dreaded-apes-wallet-extension.zip",
              "docs/assets/wallet/media-vault-empty-state-1200x800.png",
          ]

          missing = [path for path in required if not Path(path).exists()]
          if missing:
              raise SystemExit(f"Missing required Pages assets: {missing}")
          PY

          diff -qr dreaded-apes-wallet/public docs
