name: Deploy Dreaded Apes Wallet to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - dreaded-apes-wallet/**
      - .github/workflows/dreaded-apes-wallet-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: dreaded-apes-wallet-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Dreaded Apes Wallet
        uses: actions/upload-pages-artifact@v5
        with:
          path: dreaded-apes-wallet/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
