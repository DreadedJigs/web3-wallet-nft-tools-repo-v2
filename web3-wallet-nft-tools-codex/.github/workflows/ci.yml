name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  node:
    name: Node checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  contracts:
    name: Foundry checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Build contracts
        working-directory: packages/contracts
        run: forge build
      - name: Test contracts
        working-directory: packages/contracts
        run: forge test
